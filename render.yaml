services:
  - type: web
    name: kalshi-phone-helper
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: KALSHI_BASE_URL
        value: https://api.elections.kalshi.com/trade-api/v2
      - key: API_TIMEOUT
        value: 20
